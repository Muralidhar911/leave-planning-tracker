<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="48" height="48" rx="12" fill="url(#grad1)" />

  <!-- Calendar base -->
  <rect x="10" y="14" width="28" height="24" rx="4" fill="white" fill-opacity="0.15" stroke="white" stroke-opacity="0.6" stroke-width="1.5"/>

  <!-- Calendar header bar -->
  <rect x="10" y="14" width="28" height="8" rx="4" fill="white" fill-opacity="0.25"/>
  <rect x="10" y="19" width="28" height="3" fill="white" fill-opacity="0.25"/>

  <!-- Calendar hook pins -->
  <rect x="17" y="11" width="2.5" height="6" rx="1.25" fill="white" fill-opacity="0.9"/>
  <rect x="28.5" y="11" width="2.5" height="6" rx="1.25" fill="white" fill-opacity="0.9"/>

  <!-- Checkmark (large, centered) -->
  <path d="M17 29 L21.5 34 L31 24" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Small gear dot accent bottom right -->
  <circle cx="36" cy="36" r="5" fill="url(#grad2)" opacity="0.9"/>
  <path d="M36 33.5 L36 38.5 M33.5 36 L38.5 36" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <circle cx="36" cy="36" r="1.5" fill="white" opacity="0.8"/>
</svg>
